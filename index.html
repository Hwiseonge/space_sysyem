<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 모바일에서도 무조건 PC 화면 해상도(1200px) 기준으로 렌더링하도록 강제 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    
    <title>외계행성 거주 가능성 탐사 시스템</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* 🎬 버튼 그룹 부드러운 화면 전환 애니메이션 효과 */
        @keyframes menuFadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.98); }
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="intro-body">

    <div class="intro-container">
        <!-- 상단 타이틀 부 -->
        <div class="intro-header">
            <div class="agency-tag">WONJU-HIGH-SCHOOL-SPACE-SYSTEM</div>
            <h1>외계행성<br><span class="highlight">분석기</span></h1>
            <p class="intro-subtitle">우주 망원경 관측 데이터 분석 및 환경 시뮬레이션 시스템</p>
        </div>

        <hr class="intro-divider">

        <!-- 버튼 선택 섹션 -->
        <div class="menu-selection">
            <p class="selection-guide">원하시는 분석 모드를 선택하십시오.</p>
            
            <div class="btn-group">
                
                <!-- ========================================================
                     [A 그룹] 메인 화면 (처음에 보이는 3개의 버튼)
                     ======================================================== -->
                <div id="main-menu-group" style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
                    <!-- 1. 프로젝트 소개 -->
                    <button class="nav-btn about-data-btn" onclick="location.href='about.html'">
                        <div class="btn-icon">❓</div>
                        <div class="btn-text">
                            <span class="btn-title">프로젝트 소개</span>
                            <span class="btn-desc">이해에 도움을 줍니다.</span>
                        </div>
                    </button>
                
                    <!-- 2. 외계행성 탐사 체험하기 (통합 버튼) -->
                    <button class="nav-btn real-data-btn" onclick="toggleSubMenu(true)" style="border-color: #2a7fff;">
                        <div class="btn-icon">🛸</div>
                        <div class="btn-text">
                            <span class="btn-title" style="color: #6ab8ff;">외계행성 탐사 체험하기</span>
                            <span class="btn-desc">실측 데이터 분석 및 가상 행성 시뮬레이터를 가동합니다.</span>
                        </div>
                    </button>

                    <!-- 3. 원여고 외계천체 보러가기 -->
                    <button class="nav-btn archive-btn" onclick="location.href='archive.html'" style="border-color: #2ecc71;">
                        <div class="btn-icon">🌌</div>
                        <div class="btn-text">
                            <span class="btn-title" style="color: #ffffff;">원여고 외계천체 보러가기</span>
                            <span class="btn-desc">탐사대원들이 발견하고 등록한 외계행성 도감을 열람합니다.</span>
                        </div>
                    </button>
                </div>

                <!-- ========================================================
                     [B 그룹] 체험 세부 선택 화면 (처음에는 숨겨짐)
                     ======================================================== -->
                <div id="experience-menu-group" style="display: none; flex-direction: column; gap: 15px; width: 100%;">
                    <!-- 1. 나사 실측 데이터 사용하기 -->
                    <button class="nav-btn real-data-btn" onclick="location.href='main.html'">
                        <div class="btn-icon">🔭</div>
                        <div class="btn-text">
                            <span class="btn-title">나사 실측 데이터 사용하기</span>
                            <span class="btn-desc">NASA Exoplanet Archive 실제 관측 데이터를 기반으로 물리량을 역산합니다.</span>
                        </div>
                    </button>

                    <!-- 2. 가상 데이터 사용하기 -->
                    <button class="nav-btn virtual-data-btn" onclick="location.href='notice.html'">
                        <div class="btn-icon">🛠️</div>
                        <div class="btn-text">
                            <span class="btn-title">가상 데이터 사용하기 (즐거운!)</span>
                            <span class="btn-desc">행성의 질량, 궤도, 반사율을 직접 커스텀하여 가상의 생태계를 시뮬레이션합니다.</span>
                        </div>
                    </button>

                    <!-- 3. ⬅️ 이전 메인화면으로 복귀 버튼 -->
                    <button class="nav-btn" onclick="toggleSubMenu(false)" style="background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.2); justify-content: center; padding: 15px;">
                        <span style="font-size: 1rem; color: #aaaaaa; font-weight: bold;">⬅️ 이전 메인화면으로</span>
                    </button>
                </div>

            </div>
        </div>

        <!-- 하단 시스템 정보 -->
        <footer class="intro-footer">
            <span class="status-online">31103 김서윤 / 31106 김예린 / 31110 성소휘 / 31111 송소현</span>
        </footer>
    </div>

</body>

<script>
// ⚙️ 메뉴를 교차 전환해주는 자바스크립트 엔진
function toggleSubMenu(showExperience) {
    const mainMenu = document.getElementById('main-menu-group');
    const expMenu = document.getElementById('experience-menu-group');

    if (showExperience) {
        // 체험하기 클릭 시: 메인 메뉴 아웃 ➔ 서브 메뉴 인
        mainMenu.style.animation = "menuFadeOut 0.25s ease forwards";
        setTimeout(() => {
            mainMenu.style.display = "none";
            expMenu.style.display = "flex";
            expMenu.style.animation = "menuFadeIn 0.3s ease forwards";
        }, 250);
    } else {
        // 이전으로 클릭 시: 서브 메뉴 아웃 ➔ 메인 메뉴 인
        expMenu.style.animation = "menuFadeOut 0.25s ease forwards";
        setTimeout(() => {
            expMenu.style.display = "none";
            mainMenu.style.display = "flex";
            mainMenu.style.animation = "menuFadeIn 0.3s ease forwards";
        }, 250);
    }
}
</script>
</html>
