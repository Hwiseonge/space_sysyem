<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 및 PC 화면 통일감을 위해 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    <title>외계인으로부터 온 비밀 편지 👽</title>
    
    <style>
        /* 🌌 기존 아카이브 페이지와 동일한 어두운 우주 테마 CSS 배경 통일 */
        body {
            background: #010811;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 🛸 상단 헤더 스타일 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: #2ecc71;
            font-size: 2.5rem;
            margin: 0;
        }
        header p {
            color: #aaa;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* ✉️ 편지 컨테이너 및 둠칫둠칫 흔들흔들 애니메이션 (외계인 댄스와 동기화) */
        .letter-container {
            position: relative;
            width: 320px;
            height: auto;
            margin-bottom: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 기본 흔들림 애니메이션 적용 */
            animation: alienLetterDance 0.7s ease-in-out infinite alternate;
            /* 서서히 커지고 작아지도록 부드러운 transition 적용 */
            transition: transform 0.6s ease-in-out; 
        }

        /* 외계인 애니메이션과 완벽 매칭되는 흔들림 정의 */
        @keyframes alienLetterDance {
            0% { transform: translateY(0) scaleX(1) rotate(-6deg); }
            100% { transform: translateY(-12px) scaleX(0.96) rotate(6deg); }
        }

        /* 편지 이미지 자체 스타일 */
        .letter-img {
            width: 100%;
            height: auto;
            max-width: 320px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.2));
        }

        /* 💥 확인 버튼 클릭 시 서서히 150% 커지는 스타일 (애니메이션과 동시 유지) */
        .letter-container.open-impact {
            /* 흔들리는 애니메이션(alienLetterDance)을 유지하되, 기준 크기만 1.5배로 확장 */
            animation: alienLetterDanceImpact 0.7s ease-in-out infinite alternate;
        }

        /* 150% 커진 상태에서 흔들리는 애니메이션 정의 */
        @keyframes alienLetterDanceImpact {
            0% { transform: translateY(0) scale(1.5) rotate(-6deg); }
            100% { transform: translateY(-12px) scale(1.45) rotate(6deg); }
        }

        /* 🔘 네온 불빛이 들어오는 SF풍 확인 / 다음 버튼 */
        .action-btn {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 2px solid #2ecc71;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
            transition: all 0.3s ease;
            margin: 5px;
        }
        .action-btn:hover {
            background: #2ecc71;
            color: #010811;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.6);
            transform: translateY(-3px);
        }
        
        /* 다람쥐 쳇바퀴 돌듯 서서히 나타나는 다음 버튼용 스타일 */
        #nextBtn {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }
        #nextBtn.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 📜 내부 편지 내용이 들어갈 텍스트 영역 */
        .letter-content {
            display: none;
            position: absolute;
            width: 80%;
            text-align: center;
            color: #0b132b; /* 편지지가 밝을 것을 대비한 어두운 글씨색 */
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: 10;
            padding: 20px;
        }
        .letter-content.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <h1>❗미확인 수신 통지</h1>
        <p>알 수 없는 편지가 도착했습니다.</p>
    </header>

    <!-- 편지 영역 -->
    <div class="letter-container" id="letterContainer">
        <!-- 편지 폴더 안의 이미지 경로 세팅 완료 -->
        <img src="편지/편지.png" alt="외계인의 편지" class="letter-img" id="letterImg">
        
      
    </div>

    <!-- 버튼 배치 레이아웃 -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <!-- 확인 버튼 -->
        <button class="action-btn" id="confirmBtn" onclick="openAlienLetter()">✉️ 편지 확인하기</button>
        
        <!-- 다음 버튼 (처음에는 숨겨져 있다가 확인 누르면 나타남) -->
        <button class="action-btn" id="nextBtn" style="display: none;" onclick="location.href='virtual.html'">🚀 다음 단계로</button>
    </div>

    <script>
        function openAlienLetter() {
            const container = document.getElementById('letterContainer');
            const img = document.getElementById('letterImg');
            const content = document.getElementById('letterContent');
            const confirmBtn = document.getElementById('confirmBtn');
            const nextBtn = document.getElementById('nextBtn');

            // 이미 열려있는 상태라면 중복 실행 방지
            if(container.classList.contains('open-impact') || img.src.includes('편지/편지오픈.png')) return;

            // 1. 흔들림을 유지한 채 서서히 1.5배(150%)로 커지기 시작
            container.classList.add('open-impact');

            // 2. 크기가 서서히 커지는 중간(0.4초 후)에 자연스럽게 이미지를 '편지오픈.png'로 교체
            setTimeout(() => {
                img.src = '편지/편지오픈.png';
                
                // 편지 내부 텍스트 서서히 등장
                content.classList.add('show');
            }, 400); 

            // 3. 편지가 다 커진 후 아래에 '다음 단계로' 버튼을 새로 생성 및 표시
            setTimeout(() => {
                // 기존 확인 버튼 비활성화 처리 (숨기거나 투명화 가능, 여기선 문구 변경)
                confirmBtn.style.opacity = "0.5";
                confirmBtn.innerText = "✓ 확인 완료";
                confirmBtn.removeAttribute('onclick');
                confirmBtn.style.cursor = "default";

                // 다음 버튼 등장!
                nextBtn.style.display = "block";
                setTimeout(() => {
                    nextBtn.classList.add('show');
                }, 50); // 부드러운 페이드인 효과를 위한 미세 간격
            }, 600);
        }
    </script>
</body>
</html>
